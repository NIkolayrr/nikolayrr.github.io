<div class="footer">
    <a class="page-link" href="{{ "/" | relative_url }}">Home</a>
    {% assign menu_pages = site.pages | where: "showInMenu", true | sort: "title" %}
    {% for my_page in menu_pages %}
      {% if my_page.url != "/" %}
        <span>&#8226;</span>
        <a class="page-link" href="{{ my_page.url | relative_url }}">{{ my_page.title | escape }}</a>
      {% endif %}
    {% endfor %}
</div>
