<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>
    (function() {
      const savedTheme = window.localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = savedTheme || (prefersDark ? 'dark' : 'dark');
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  {%- seo -%} <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}"> <link rel="stylesheet" href="{{
  "/assets/css/styles.css" | relative_url }}"> {%- feed_meta -%} {%- if jekyll.environment == 'production' and
  site.google_analytics -%} {%- include google-analytics.html -%} {%- endif -%}
  <link rel="preconnect" href="https://fonts.gstatic.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,400;0,500;1,100&display=swap"
    rel="stylesheet"
  />
  <script>
    const themeToggleButton = () => document.getElementById('theme-toggle');
    const currentTheme = () => window.localStorage.getItem('theme');
    const applyTheme = (theme) => {
      document.documentElement.dataset.theme = theme;
      window.localStorage.setItem('theme', theme);
    };
    document.addEventListener('DOMContentLoaded', () => {
      const savedTheme = currentTheme();
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      applyTheme(savedTheme || (prefersDark ? 'dark' : 'dark'));
      const button = themeToggleButton();
      if (!button) return;
      button.addEventListener('click', () => {
        const nextTheme = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
        applyTheme(nextTheme);
      });
    });
  </script>
</head>
